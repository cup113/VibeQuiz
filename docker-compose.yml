services:
  vibe-quiz:
    build: .
    ports:
      - "3001:3001"
    environment:
      - MCP_TRANSPORT=sse
      - BASE_URL=http://your-domain.com:3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); http.get('http://localhost:3001/health', r => {process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
